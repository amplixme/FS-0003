services:
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_DB=my-api
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=devs123
    ports:
      - 5432:5432
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@gmail.com
      - PGADMIN_DEFAULT_PASSWORD=ROOT
    ports:
      - 5050:80